services:
  postgres-service:
    container_name: postgres-service
    image: postgres:18-bookworm
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=$POSTGRES_DB
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_USER=$POSTGRES_USER
    volumes:
      - $PWD/out/pg_data:/var/lib/postgresql
    restart: always
    networks:
      - ci_cd_net
  migrate:
    image: migrate/migrate
    volumes:
      - $PWD/migrations:/migrations
    command:
      - -path=/migrations
      - -database=$MIGRATE_URL
      - up
    depends_on:
      - postgres-service
    networks:
      - ci_cd_net
  
  backend-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres-service
    environment:
      - DB_URL=postgres://postgres:1234@postgres-service:5432/ci_cd_learn?sslmode=disable&options=-c%20search_path=users_schema
    networks:
      - ci_cd_net

networks:
  ci_cd_net:
    name: ci_cd_net
    driver: bridge
