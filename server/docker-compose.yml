

services:
  postgres-service:
    image: postgres:18-bookworm
    container_name: postgres-service
    volumes:
      - $PWD/out/pg_data:/var/lib/postgresql
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=$POSTGRES_DB
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
    